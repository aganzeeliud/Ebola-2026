<!DOCTYPE html>
<html>
<head>
    <title>Ebola Outbreak Map 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .info h4 { margin: 0 0 5px; color: #777; }
    </style>
</head>
<body>
    <h1>2026 Ebola Outbreak Map (DRC & Uganda)</h1>
    <div id="map"></div>
    <script src="data.js"></script>
    <script>
        var map = L.map('map').setView([0, 25], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        ebolaData.forEach(function(d) {
            var radius = Math.sqrt(d.cases) * 5;
            var color = d.country === 'DRC' ? '#ff4d4d' : '#4d94ff';
            
            var circle = L.circleMarker([d.lat, d.lon], {
                radius: radius,
                fillColor: color,
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            circle.bindPopup(
                "<b>" + d.city + ", " + d.country + "</b><br>" +
                "Province: " + d.province + "<br>" +
                "Confirmed Cases: " + d.cases + "<br>" +
                "Confirmed Deaths: " + d.deaths + "<br>" +
                "Recoveries: " + d.recoveries + "<br>" +
                "Case Fatality Rate: " + d.cfr + "%"
            );
        });

        // Fit map to markers
        var group = new L.featureGroup(ebolaData.map(function(d) {
            return L.marker([d.lat, d.lon]);
        }));
        map.fitBounds(group.getBounds());

    </script>
</body>
</html>
