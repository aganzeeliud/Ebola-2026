<!DOCTYPE html>
<html>
<head>
    <title>Ebola Outbreak Map 2026</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .info h4 { margin: 0 0 5px; color: #777; }
    </style>
</head>
<body>
    <h1>2026 Ebola Outbreak Map (DRC & Uganda)</h1>
    <div id="map"></div>
    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof ebolaMapData === 'undefined') {
                console.error("ebolaMapData is not defined. Make sure data.js is loaded correctly.");
                document.getElementById('map').innerHTML = "Error: Data could not be loaded.";
                return;
            }

            var map = L.map('map').setView([0, 25], 5);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            var bounds = L.latLngBounds();

            // Render Outbreak Zones
            ebolaMapData.ebolaData.forEach(function(d) {
                if (d.lat && d.lon) {
                    var radius = Math.sqrt(d.cases) * 3;
                    var color = d.country === 'DRC' ? '#ff4d4d' : '#4d94ff';
                    
                    var circle = L.circleMarker([d.lat, d.lon], {
                        radius: radius,
                        fillColor: color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.6
                    }).addTo(map);

                    circle.bindPopup(
                        "<b>" + d.city + ", " + d.country + "</b><br>" +
                        "Province: " + d.province + "<br>" +
                        "Confirmed Cases: " + d.cases + "<br>" +
                        "Confirmed Deaths: " + d.deaths + "<br>" +
                        "Recoveries: " + d.recoveries + "<br>" +
                        "Case Fatality Rate: " + d.cfr + "%"
                    );

                    bounds.extend([d.lat, d.lon]);
                }
            });

            // Render Health Centers
            ebolaMapData.healthCenters.forEach(function(hc) {
                var medicalIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div style='background-color:#00cc44; border: 2px solid white; border-radius: 50%; width: 12px; height: 12px;'></div>",
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                var marker = L.marker([hc.lat, hc.lon], {icon: medicalIcon}).addTo(map);
                marker.bindPopup("<b>" + hc.name + "</b><br>Type: " + hc.type);
                bounds.extend([hc.lat, hc.lon]);
            });

            if (ebolaMapData.ebolaData.length > 0 || ebolaMapData.healthCenters.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            // Legend
            var legend = L.control({position: 'bottomright'});
            legend.onAdd = function (map) {
                var div = L.DomUtil.create('div', 'info legend');
                div.style.backgroundColor = 'white';
                div.style.padding = '10px';
                div.style.border = '1px solid #ccc';
                div.innerHTML = '<h4>Outbreak Legend</h4>' +
                                '<i style="background: #ff4d4d; width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.6; border: 1px solid #000; border-radius: 50%;"></i> DRC Health Zone<br><br>' +
                                '<i style="background: #4d94ff; width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.6; border: 1px solid #000; border-radius: 50%;"></i> Uganda Health Zone<br><br>' +
                                '<i style="background: #00cc44; width: 12px; height: 12px; float: left; margin-right: 12px; border: 2px solid white; border-radius: 50%; margin-top: 3px;"></i> Health Center / ETC<br><br>' +
                                '<span>Circle size proportional to cases</span>';
                return div;
            };
            legend.addTo(map);
        });
    </script>
</body>
</html>
